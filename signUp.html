<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — Streamify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-page">

  <img src="img/dark.jpg" class="auth-bg" alt=""/>

  <nav class="navbar">
    <a href="index.html" class="logo">STREAM<span>IFY</span></a>
    <div class="nav-right">
      <button class="btn-signin" onclick="window.location.href='index.html'">Back to home</button>
    </div>
  </nav>

  <div class="auth-center">
    <form id="signupForm" class="auth-box" novalidate>
      <a href="index.html" class="auth-logo">STREAM<span>IFY</span></a>
      <h2>Create your account</h2>

      <div class="auth-error" id="authError"></div>

      <div class="auth-field">
        <label for="name">Full name</label>
        <input type="text" id="name" placeholder="Your name" required autocomplete="name"/>
      </div>
      <div class="auth-field">
        <label for="signupEmail">Email address</label>
        <input type="email" id="signupEmail" placeholder="you@example.com" required autocomplete="email"/>
      </div>
      <div class="auth-field">
        <label for="signupPassword">Password</label>
        <input type="password" id="signupPassword" placeholder="At least 6 characters" required autocomplete="new-password"/>
      </div>
      <div class="auth-field">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" placeholder="Type it again" required autocomplete="new-password"/>
      </div>

      <button type="submit" class="btn-auth">Sign up</button>
      <p class="auth-switch">Already have an account? <a href="login.html">Log in now</a></p>
    </form>
  </div>

  <script src="auth.js"></script>
  <script>
    const form = document.getElementById("signupForm");
    const errorBox = document.getElementById("authError");

    function showError(message) {
      errorBox.textContent = message;
      errorBox.classList.add("show");
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      errorBox.classList.remove("show");

      const name = document.getElementById("name").value;
      const email = document.getElementById("signupEmail").value;
      const password = document.getElementById("signupPassword").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      if (password !== confirmPassword) {
        showError("Passwords don't match.");
        return;
      }

      const result = Auth.signUp({ name, email, password });
      if (!result.ok) {
        showError(result.error);
        return;
      }
      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
